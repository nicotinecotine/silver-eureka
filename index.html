<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="moi kroshki... — подсказчик еды">

  <!-- PWA / iOS meta tags -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <!-- default вместо black-translucent: НЕ оверлейный, стандартный
       статус-бар. На устройстве железно подтверждено, что нижняя safe area
       в оверлейном (black-translucent) режиме standalone PWA физически
       не дорисовывается никаким CSS/JS — это обрез на уровне iOS, а не
       баг нашего кода (проверено даже отрицательным bottom-оффсетом).
       В обычном (не оверлейном) режиме страница получает от системы
       честный, полностью пригодный для рисования вьюпорт без дыр. -->
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="moi kroshki...">
  <meta name="theme-color" content="#FF6B4A">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>moi kroshki...</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html {
      height: 100%;
      height: 100dvh;
      margin: 0;
      overflow: hidden;
      background: linear-gradient(to bottom, #CFEFFF 0%, #7FD4F5 28%, #29C5EE 50%, #8BD34F 82%, #4FA733 100%);
    }
    body {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      height: 100dvh;
      margin: 0;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      background: linear-gradient(to bottom, #CFEFFF 0%, #7FD4F5 28%, #29C5EE 50%, #8BD34F 82%, #4FA733 100%);
    }
    input, textarea, [contenteditable] {
      -webkit-user-select: text;
      user-select: text;
    }
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: linear-gradient(to bottom, #CFEFFF 0%, #7FD4F5 28%, #29C5EE 50%, #8BD34F 82%, #4FA733 100%);
    }
    #loading img {
      width: 96px;
      height: 96px;
      animation: loading-bounce 0.9s ease-in-out infinite;
    }
    @keyframes loading-bounce {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-18px) scale(1.05); }
    }
  </style>
</head>
<body>
  <div id="loading">
    <img src="icons/loading_pig.png" alt="">
  </div>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    // Официальное событие первого кадра движка — убираем лоадер по нему,
    // а не полагаемся на то, что канвас Flutter «сам перекроет» div навсегда.
    window.addEventListener('flutter-first-frame', function () {
      const loading = document.getElementById('loading');
      if (loading) loading.remove();
    });

    // MediaQuery.padding у Flutter web не отдаёт реальные отступы под
    // безопасные зоны (см. full_page_dimensions_provider.dart в исходниках
    // движка). Меряем настоящие env(safe-area-inset-*) сами через скрытый
    // зонд и кладём в window, чтобы Dart-код (AppSafeArea) читал их
    // напрямую вместо сломанного MediaQuery.
    (function () {
      const probe = document.createElement('div');
      probe.style.cssText =
        'position:fixed;inset:0;visibility:hidden;pointer-events:none;' +
        'padding-top:env(safe-area-inset-top);' +
        'padding-right:env(safe-area-inset-right);' +
        'padding-bottom:env(safe-area-inset-bottom);' +
        'padding-left:env(safe-area-inset-left);';
      document.body.appendChild(probe);

      function measure() {
        const cs = getComputedStyle(probe);
        window.__safeAreaInsets = {
          top: parseFloat(cs.paddingTop) || 0,
          right: parseFloat(cs.paddingRight) || 0,
          bottom: parseFloat(cs.paddingBottom) || 0,
          left: parseFloat(cs.paddingLeft) || 0,
        };
      }

      measure();
      window.addEventListener('resize', measure);
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', measure);
      }
      [300, 1000].forEach((ms) => setTimeout(measure, ms));
    })();
  </script>
</body>
</html>
