<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="moi kroshki... — подсказчик еды">

  <!-- PWA / iOS meta tags -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="moi kroshki...">
  <meta name="theme-color" content="#FF6B4A">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>moi kroshki...</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html {
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: linear-gradient(to bottom, #CFEFFF 0%, #7FD4F5 28%, #29C5EE 50%, #8BD34F 82%, #4FA733 100%);
    }
    body {
      /* Жёстко фиксируем геометрию страницы: на iOS PWA (standalone) любой
         дрейф/боунс внешней страницы рассинхронизирует координаты тапов
         с тем, что реально отрисовано в канвасе Flutter. */
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    input, textarea, [contenteditable] {
      -webkit-user-select: text;
      user-select: text;
    }
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: linear-gradient(to bottom, #CFEFFF 0%, #7FD4F5 28%, #29C5EE 50%, #8BD34F 82%, #4FA733 100%);
    }
    #loading img {
      width: 96px;
      height: 96px;
      animation: loading-bounce 0.9s ease-in-out infinite;
    }
    @keyframes loading-bounce {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-18px) scale(1.05); }
    }
  </style>
</head>
<body>
  <div id="loading">
    <img src="icons/loading_pig.png" alt="">
  </div>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    // Flutter web (FullPageEmbeddingStrategy) при инициализации удаляет ЛЮБОЙ
    // наш <meta name="viewport"> и ставит свой — жёстко прошитый, БЕЗ
    // viewport-fit=cover (см. full_page_embedding_strategy.dart в исходниках
    // движка). Без viewport-fit=cover env(safe-area-inset-*) всегда равны 0,
    // хотя реальный вырез (чёлка/остров) на экране есть — отсюда цветной шов
    // и рассинхрон геометрии. Патчим тег движка сразу после создания.
    (function () {
      function forceRemeasure() {
        // Патч viewport-fit сам по себе не толкает Flutter пересчитать
        // document.documentElement.clientHeight — это происходит только по
        // событию resize на visualViewport (full_page_dimensions_provider.dart).
        // Форсим его сразу после патча, чтобы движок взял уже верную геометрию,
        // а не ждал первого реального ресайза (клавиатура/поворот).
        try {
          if (window.visualViewport) {
            window.visualViewport.dispatchEvent(new Event('resize'));
          }
          window.dispatchEvent(new Event('resize'));
        } catch (e) {}
      }
      function patch(meta) {
        if (meta.content.indexOf('viewport-fit') === -1) {
          meta.content += ', viewport-fit=cover';
          forceRemeasure();
        }
      }
      const existing = document.querySelector('meta[flt-viewport]');
      if (existing) patch(existing);
      new MutationObserver(() => {
        const meta = document.querySelector('meta[flt-viewport]');
        if (meta) patch(meta);
      }).observe(document.head, {childList: true});
      // Подстраховка: если движок успел измерить размер раньше, чем сработал
      // наш патч, форсим пересчёт ещё пару раз.
      [300, 1000].forEach((ms) => setTimeout(forceRemeasure, ms));
    })();

    // Официальное событие первого кадра движка — убираем лоадер по нему,
    // а не полагаемся на то, что канвас Flutter «сам перекроет» div навсегда
    // (иначе он остаётся в DOM и вылезает при ресайзе вьюпорта клавиатурой).
    window.addEventListener('flutter-first-frame', function () {
      const loading = document.getElementById('loading');
      if (loading) loading.remove();
    });

    // MediaQuery.padding у Flutter web ВСЕГДА 0 сверху и не даёт нижний
    // safe-area инсет вне клавиатуры (см. full_page_dimensions_provider.dart —
    // top жёстко захардкожен, это не баг конкретно нашего фикса, а
    // ограничение движка). SafeArea() в Dart из-за этого не работает.
    // Меряем настоящие env(safe-area-inset-*) сами через скрытый зонд и
    // кладём в window, чтобы Dart-код читал их напрямую вместо MediaQuery.
    (function () {
      const probe = document.createElement('div');
      probe.style.cssText =
        'position:fixed;inset:0;visibility:hidden;pointer-events:none;' +
        'padding-top:env(safe-area-inset-top);' +
        'padding-right:env(safe-area-inset-right);' +
        'padding-bottom:env(safe-area-inset-bottom);' +
        'padding-left:env(safe-area-inset-left);';
      document.body.appendChild(probe);

      function measure() {
        const cs = getComputedStyle(probe);
        window.__safeAreaInsets = {
          top: parseFloat(cs.paddingTop) || 0,
          right: parseFloat(cs.paddingRight) || 0,
          bottom: parseFloat(cs.paddingBottom) || 0,
          left: parseFloat(cs.paddingLeft) || 0,
        };
      }

      measure();
      window.addEventListener('resize', measure);
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', measure);
      }
      [300, 1000].forEach((ms) => setTimeout(measure, ms));
    })();
  </script>
</body>
</html>
