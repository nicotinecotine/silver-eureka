<!DOCTYPE html>
<html>
<head>
  <base href="/silver-eureka/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="moi kroshki... — подсказчик еды">

  <!-- PWA / iOS meta tags -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="moi kroshki...">
  <meta name="theme-color" content="#FF6B4A">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>moi kroshki...</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html {
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: linear-gradient(to bottom, #CFEFFF 0%, #7FD4F5 28%, #29C5EE 50%, #8BD34F 82%, #4FA733 100%);
    }
    body {
      /* Жёстко фиксируем геометрию страницы: на iOS PWA (standalone) любой
         дрейф/боунс внешней страницы рассинхронизирует координаты тапов
         с тем, что реально отрисовано в канвасе Flutter. */
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    input, textarea, [contenteditable] {
      -webkit-user-select: text;
      user-select: text;
    }
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: linear-gradient(to bottom, #CFEFFF 0%, #7FD4F5 28%, #29C5EE 50%, #8BD34F 82%, #4FA733 100%);
    }
    #loading img {
      width: 96px;
      height: 96px;
      animation: loading-bounce 0.9s ease-in-out infinite;
    }
    @keyframes loading-bounce {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-18px) scale(1.05); }
    }
  </style>
</head>
<body>
  <div id="loading">
    <img src="icons/loading_pig.png" alt="">
  </div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
